<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Жизнь Максима Горького — Игра</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
    <style>
        /* ─── Reset & Base ─── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: #1a100e;
            color: #f0e6d3;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        /* ─── Фоновая анимация ─── */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(201, 168, 76, 0.10);
            box-shadow: 0 0 20px rgba(201, 168, 76, 0.05);
            animation: floatParticle linear infinite;
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(110vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* ─── Контейнер ─── */
        .game-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 1100px;
            background: rgba(26, 16, 14, 0.88);
            backdrop-filter: blur(6px);
            border-radius: 48px 48px 32px 32px;
            padding: 28px 32px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(201, 168, 76, 0.15);
            border: 1px solid rgba(201, 168, 76, 0.10);
        }

        /* ─── Шапка: портрет + заголовок ─── */
        .header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(201, 168, 76, 0.15);
            flex-wrap: wrap;
        }

        .portrait-wrap {
            flex-shrink: 0;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid #c9a84c;
            box-shadow: 0 0 30px rgba(201, 168, 76, 0.20);
            background: #2c1810;
        }

        .portrait-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .header-text {
            flex: 1;
        }

        .header-text h1 {
            font-size: clamp(1.5rem, 4vw, 2.6rem);
            font-weight: 900;
            letter-spacing: 1px;
            color: #f0e6d3;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
            line-height: 1.2;
        }

        .header-text h1 span {
            color: #c9a84c;
        }

        .header-text p {
            font-size: clamp(0.85rem, 1.4vw, 1.1rem);
            color: #b8aa92;
            font-weight: 400;
            margin-top: 2px;
            letter-spacing: 0.3px;
        }

        .progress-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(201, 168, 76, 0.10);
            padding: 8px 18px 8px 14px;
            border-radius: 40px;
            border: 1px solid rgba(201, 168, 76, 0.20);
            font-weight: 700;
            font-size: 0.95rem;
            color: #c9a84c;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .progress-badge .num {
            background: #c9a84c;
            color: #1a100e;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 900;
        }

        /* ─── Сетка дверей ─── */
        .doors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 28px 24px;
            margin-top: 8px;
        }

        .door-card {
            perspective: 1200px;
            cursor: pointer;
            transition: transform 0.25s ease, opacity 0.3s ease;
            position: relative;
            aspect-ratio: 0.75 / 1;
            max-width: 200px;
            margin: 0 auto;
            width: 100%;
        }

        .door-card:hover:not(.locked):not(.completed) {
            transform: translateY(-6px);
        }

        .door-card.locked {
            cursor: not-allowed;
            opacity: 0.45;
            filter: grayscale(0.6);
        }

        .door-card.locked .door-inner {
            background: linear-gradient(145deg, #3d2b1f, #2a1a12);
            border-color: #4a3525;
        }

        .door-card.locked .door-label {
            color: #6a5a4a;
        }

        .door-card.completed {
            cursor: default;
        }

        .door-card.completed .door-inner {
            border-color: #c9a84c;
            box-shadow: 0 0 30px rgba(201, 168, 76, 0.15), inset 0 0 30px rgba(201, 168, 76, 0.05);
        }

        .door-card.completed .door-check {
            opacity: 1;
        }

        /* ─── Сама дверь ─── */
        .door-inner {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 16px 16px 8px 8px;
            background: linear-gradient(160deg, #6b4c34, #4d3222);
            border: 2px solid #5a3d2b;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5), inset 0 2px 0 rgba(255, 255, 255, 0.06);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px 10px;
            overflow: hidden;
        }

        .door-card:not(.locked):not(.completed) .door-inner::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 20%, rgba(201, 168, 76, 0.06), transparent 70%);
            pointer-events: none;
        }

        /* панели двери */
        .door-panels {
            position: absolute;
            inset: 12px;
            border: 1px solid rgba(201, 168, 76, 0.08);
            border-radius: 10px;
            background: repeating-linear-gradient(0deg,
                    transparent,
                    transparent 20px,
                    rgba(201, 168, 76, 0.03) 20px,
                    rgba(201, 168, 76, 0.03) 21px);
            pointer-events: none;
        }

        .door-panels::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70%;
            height: 70%;
            border: 1px solid rgba(201, 168, 76, 0.06);
            border-radius: 6px;
        }

        /* ручка */
        .door-handle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 35%, #e8d5a8, #b8943c);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5), inset 0 -2px 4px rgba(0, 0, 0, 0.2);
            border: 1px solid #a88630;
            transition: all 0.3s ease;
        }

        .door-card:not(.locked):not(.completed):hover .door-handle {
            transform: translateY(-50%) scale(1.15);
            box-shadow: 0 2px 16px rgba(201, 168, 76, 0.3), inset 0 -2px 4px rgba(0, 0, 0, 0.2);
        }

        .door-card.locked .door-handle {
            background: radial-gradient(circle at 40% 35%, #6a5a4a, #4a3a2a);
            border-color: #3d2d1d;
        }

        /* номер двери */
        .door-number {
            position: absolute;
            top: 10px;
            left: 12px;
            font-size: 0.75rem;
            font-weight: 900;
            color: rgba(201, 168, 76, 0.30);
            letter-spacing: 0.5px;
        }

        .door-card.locked .door-number {
            color: rgba(90, 70, 50, 0.40);
        }

        /* метка завершения */
        .door-check {
            position: absolute;
            top: 10px;
            right: 12px;
            font-size: 1.2rem;
            opacity: 0;
            transition: opacity 0.4s ease;
            color: #c9a84c;
            text-shadow: 0 0 20px rgba(201, 168, 76, 0.3);
        }

        /* текст на двери */
        .door-label {
            font-weight: 900;
            font-size: clamp(0.85rem, 1.5vw, 1.1rem);
            text-align: center;
            color: #f0e6d3;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
            line-height: 1.3;
            z-index: 1;
            position: relative;
            padding: 0 6px;
        }

        .door-year {
            font-size: clamp(0.65rem, 1vw, 0.8rem);
            font-weight: 700;
            color: #c9a84c;
            margin-top: 4px;
            letter-spacing: 0.5px;
            opacity: 0.8;
        }

        .door-card.locked .door-year {
            color: #6a5a4a;
        }

        .door-card.locked .door-label {
            color: #7a6a5a;
        }

        .door-card.completed .door-label {
            color: #f0e6d3;
        }

        /* замок для запертых */
        .door-lock-icon {
            position: absolute;
            bottom: 16px;
            font-size: 1.4rem;
            opacity: 0.25;
            color: #6a5a4a;
        }

        .door-card.locked .door-lock-icon {
            opacity: 0.5;
        }

        /* ─── Модальное окно (открытая дверь) ─── */
        .door-modal {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: rgba(10, 6, 5, 0.85);
            backdrop-filter: blur(10px);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .door-modal.open {
            opacity: 1;
            visibility: visible;
        }

        .door-modal-content {
            background: linear-gradient(160deg, #2c1a12, #1a100e);
            border-radius: 32px;
            max-width: 680px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 40px 44px 36px;
            border: 1px solid rgba(201, 168, 76, 0.15);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(201, 168, 76, 0.06);
            transform: scale(0.95) translateY(20px);
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease;
            opacity: 0;
            position: relative;
        }

        .door-modal.open .door-modal-content {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        .door-modal-content::-webkit-scrollbar {
            width: 4px;
        }
        .door-modal-content::-webkit-scrollbar-track {
            background: transparent;
        }
        .door-modal-content::-webkit-scrollbar-thumb {
            background: #c9a84c;
            border-radius: 10px;
        }

        .modal-close-btn {
            position: sticky;
            top: 0;
            float: right;
            background: none;
            border: none;
            color: #b8aa92;
            font-size: 1.8rem;
            cursor: pointer;
            transition: color 0.3s ease, transform 0.2s ease;
            line-height: 1;
            padding: 0 0 0 12px;
            z-index: 2;
        }

        .modal-close-btn:hover {
            color: #f0e6d3;
            transform: rotate(90deg);
        }

        .modal-stage {
            font-size: 0.75rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #c9a84c;
            margin-bottom: 4px;
        }

        .modal-title {
            font-size: clamp(1.6rem, 3.5vw, 2.4rem);
            font-weight: 900;
            color: #f0e6d3;
            line-height: 1.2;
            margin-bottom: 2px;
        }

        .modal-year {
            font-size: 1rem;
            font-weight: 700;
            color: #b8aa92;
            margin-bottom: 18px;
            display: inline-block;
            background: rgba(201, 168, 76, 0.08);
            padding: 2px 16px;
            border-radius: 20px;
            border: 1px solid rgba(201, 168, 76, 0.06);
        }

        .modal-facts {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 16px 0 24px;
        }

        .modal-fact {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            font-size: clamp(0.95rem, 1.2vw, 1.05rem);
            line-height: 1.5;
            color: #e0d6c8;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            border-left: 3px solid rgba(201, 168, 76, 0.20);
        }

        .modal-fact .icon {
            font-size: 1.2rem;
            flex-shrink: 0;
            margin-top: 1px;
            color: #c9a84c;
        }

        .modal-fact .text {
            flex: 1;
        }

        .modal-action {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            margin-top: 6px;
        }

        .btn {
            font-family: 'Nunito', sans-serif;
            font-weight: 900;
            font-size: 1rem;
            padding: 12px 32px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #c9a84c, #b8942e);
            color: #1a100e;
            box-shadow: 0 4px 20px rgba(201, 168, 76, 0.25);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(201, 168, 76, 0.35);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            color: #b8aa92;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.10);
            color: #f0e6d3;
        }

        .btn-success {
            background: linear-gradient(135deg, #5a8a4a, #3d6a2e);
            color: #f0e6d3;
            box-shadow: 0 4px 20px rgba(90, 138, 74, 0.20);
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(90, 138, 74, 0.30);
        }

        .btn-success:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* ─── Уведомление ─── */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: rgba(26, 16, 14, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(201, 168, 76, 0.20);
            padding: 14px 28px;
            border-radius: 40px;
            color: #f0e6d3;
            font-weight: 700;
            font-size: 0.95rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 2000;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast .emoji {
            font-size: 1.3rem;
        }

        /* ─── Адаптив ─── */
        @media (max-width: 700px) {
            .game-wrapper {
                padding: 16px 14px 24px;
                border-radius: 24px;
            }

            .header {
                gap: 14px;
            }

            .portrait-wrap {
                width: 56px;
                height: 56px;
            }

            .doors-grid {
                gap: 16px;
                grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            }

            .door-modal-content {
                padding: 28px 20px 24px;
                border-radius: 20px;
            }

            .btn {
                padding: 10px 22px;
                font-size: 0.9rem;
            }

            .progress-badge {
                font-size: 0.75rem;
                padding: 4px 12px 4px 8px;
            }
            .progress-badge .num {
                width: 22px;
                height: 22px;
                font-size: 0.7rem;
            }
        }

        @media (max-width: 480px) {
            .doors-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
            .door-card {
                max-width: 100%;
            }
            .door-label {
                font-size: 0.75rem;
            }
            .door-year {
                font-size: 0.6rem;
            }
            .door-handle {
                width: 8px;
                height: 8px;
                right: 8px;
            }
            .door-panels {
                inset: 6px;
            }
            .door-number {
                font-size: 0.55rem;
                top: 6px;
                left: 8px;
            }
            .door-check {
                font-size: 0.9rem;
                top: 6px;
                right: 8px;
            }
        }

        /* ─── Финишная анимация ─── */
        .confetti-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 999;
            overflow: hidden;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            opacity: 0;
            animation: confettiFall linear forwards;
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(-10vh) rotate(0deg) scale(0.5);
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) rotate(720deg) scale(1);
                opacity: 0;
            }
        }

        /* анимация свечения для пройденных дверей */
        @keyframes glowPulse {
            0%,
            100% {
                box-shadow: 0 0 20px rgba(201, 168, 76, 0.08);
            }
            50% {
                box-shadow: 0 0 40px rgba(201, 168, 76, 0.20);
            }
        }

        .door-card.completed .door-inner {
            animation: glowPulse 3s ease-in-out infinite;
        }

        /* ─── Мини-виньетка ─── */
        .vignette {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(10, 6, 5, 0.4) 100%);
        }
    </style>
</head>
<body>

    <!-- Фоновые частицы -->
    <div class="bg-animation" id="bgAnimation"></div>
    <div class="vignette"></div>

    <!-- Toast-уведомление -->
    <div class="toast" id="toast">
        <span class="emoji">📖</span>
        <span id="toastMessage">Готово!</span>
    </div>

    <!-- Конфетти-контейнер -->
    <div class="confetti-container" id="confettiContainer"></div>

    <!-- ─── ОСНОВНОЙ КОНТЕЙНЕР ─── -->
    <div class="game-wrapper" id="app">
        <!-- Шапка -->
        <header class="header">
            <div class="portrait-wrap">
                <img
                src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/8a/Maxim_Gorky_%28A._M._Peshkov%29.jpg/400px-Maxim_Gorky_%28A._M._Peshkov%29.jpg"
                alt="Портрет Максима Горького"
                loading="lazy"
                />
            </div>
            <div class="header-text">
                <h1>Жизнь <span>Максима Горького</span></h1>
                <p>Алексей Пешков · 1868–1936 · Интерактивная хроника</p>
            </div>
            <div class="progress-badge">
                <span class="num" id="progressNum">0</span>
                <span>/ 6</span>
            </div>
        </header>

        <!-- Сетка дверей -->
        <div class="doors-grid" id="doorsGrid"></div>
    </div>

    <!-- ─── МОДАЛЬНОЕ ОКНО ─── -->
    <div class="door-modal" id="doorModal">
        <div class="door-modal-content" id="modalContent">
            <button class="modal-close-btn" id="modalCloseBtn" aria-label="Закрыть">✕</button>
            <div class="modal-stage" id="modalStage">ЭТАП</div>
            <div class="modal-title" id="modalTitle">Название</div>
            <div class="modal-year" id="modalYear">1868–1879</div>
            <div class="modal-facts" id="modalFacts"></div>
            <div class="modal-action">
                <button class="btn btn-success" id="modalCompleteBtn">✅ Я запомнил!</button>
                <button class="btn btn-secondary" id="modalBackBtn">← Назад</button>
            </div>
        </div>
    </div>

    <script>
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  ДАННЫЕ
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        const stages = [{
            id: 1,
            title: 'Детство и сиротство',
            year: '1868–1879',
            icon: '👶',
            facts: [
                'Родился 28 марта 1868 года в Нижнем Новгороде.',
                'Настоящее имя — Алексей Максимович Пешков.',
                'Отец умер от холеры, когда Алексею было 4 года.',
                'Мать умерла от чахотки, мальчик остался круглым сиротой.',
                'Жил у деда и бабки Кашириных.',
                'С 11 лет начал трудовую жизнь: посыльный, буфетчик, помощник пекаря.'
            ]
        }, {
            id: 2,
            title: 'Скитания и поиски',
            year: '1884–1891',
            icon: '🚶',
            facts: [
                'Пытался поступить в Казанский университет — неудача.',
                'Арестован за участие в марксистском кружке.',
                'Работал сторожем на железной дороге.',
                'В 23 года отправился в пешее путешествие по России.',
                'Дошёл до Кавказа, записывал всё, что видел.',
                'Эти впечатления легли в основу будущих произведений.'
            ]
        }, {
            id: 3,
            title: 'Начало творчества',
            year: '1892–1895',
            icon: '✍️',
            facts: [
                '1892 — первый рассказ «Макар Чудра» в газете «Кавказ».',
                'Подписал его псевдонимом «Максим Горький».',
                '1894 — «Челкаш», «Мой спутник», повесть «Горемыка Павел».',
                '1895 — «Старуха Изергиль», поэма «Песня о Соколе».',
                'Двухтомник «Очерки и рассказы» принёс известность.',
                'Его тираж в 3 раза превышал обычные издания того времени.'
            ]
        }, {
            id: 4,
            title: 'Личная жизнь',
            year: '1896–1901',
            icon: '❤️',
            facts: [
                'Женился на Екатерине Волжиной в 1896 году.',
                'Сын Максим (1897) и дочь Екатерина (умерла в детстве).',
                'Заболел туберкулёзом, который сопровождал его всю жизнь.',
                '1901 — «Песнь о Буревестнике», арест и тюрьма.',
                'В этом же году возглавил издательство «Знание».',
                'После развода сохранил дружеские отношения с женой.'
            ]
        }, {
            id: 5,
            title: 'Признание и эмиграция',
            year: '1902–1913',
            icon: '🌍',
            facts: [
                '1902 — избран почётным академиком Академии наук.',
                'Назначение отменено, Чехов и Короленко ушли в знак протеста.',
                '1906 — эмиграция в США, затем в Италию (Капри).',
                'Там написал роман «Мать» и пьесу «Враги».',
                '1913 — амнистия и возвращение в Россию.',
                'Начал работу над автобиографической трилогией.'
            ]
        }, {
            id: 6,
            title: 'Возвращение и кончина',
            year: '1913–1936',
            icon: '🕯️',
            facts: [
                'Отрицательно отнёсся к Октябрьской революции 1917 года.',
                '1921–1928 — вторая эмиграция в Италию (из-за туберкулёза).',
                '1932 — окончательное возвращение в СССР.',
                'Романы «Дело Артамоновых» и «Жизнь Клима Самгина» (не окончен).',
                'Организатор Союза писателей СССР, первый председатель.',
                'Умер 18 июня 1936 года. Урна с прахом в Кремлёвской стене.'
            ]
        }];

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  СОСТОЯНИЕ
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        let completed = new Set();
        let currentStageId = null;
        let isModalOpen = false;

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  DOM-ссылки
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        const grid = document.getElementById('doorsGrid');
        const modal = document.getElementById('doorModal');
        const modalContent = document.getElementById('modalContent');
        const modalStage = document.getElementById('modalStage');
        const modalTitle = document.getElementById('modalTitle');
        const modalYear = document.getElementById('modalYear');
        const modalFacts = document.getElementById('modalFacts');
        const modalCompleteBtn = document.getElementById('modalCompleteBtn');
        const modalBackBtn = document.getElementById('modalBackBtn');
        const modalCloseBtn = document.getElementById('modalCloseBtn');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');
        const progressNum = document.getElementById('progressNum');
        const confettiContainer = document.getElementById('confettiContainer');

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  ФОНОВАЯ АНИМАЦИЯ (частицы)
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        function initBgParticles() {
            const container = document.getElementById('bgAnimation');
            const count = 40;
            for (let i = 0; i < count; i++) {
                const el = document.createElement('div');
                el.className = 'bg-particle';
                const size = 4 + Math.random() * 14;
                el.style.width = size + 'px';
                el.style.height = size + 'px';
                el.style.left = Math.random() * 100 + '%';
                el.style.animationDuration = 18 + Math.random() * 30 + 's';
                el.style.animationDelay = Math.random() * 20 + 's';
                el.style.opacity = 0.04 + Math.random() * 0.08;
                container.appendChild(el);
            }
        }
        initBgParticles();

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  TOAST
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        let toastTimeout = null;

        function showToast(msg, emoji = '📖') {
            toastMessage.textContent = msg;
            toast.querySelector('.emoji').textContent = emoji;
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 2800);
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  КОНФЕТТИ
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        function fireConfetti() {
            const colors = ['#c9a84c', '#f0e6d3', '#8b1a1a', '#5a8a4a', '#e8d5a8', '#b8943c'];
            for (let i = 0; i < 60; i++) {
                const el = document.createElement('div');
                el.className = 'confetti';
                const size = 4 + Math.random() * 8;
                el.style.width = size + 'px';
                el.style.height = size * (0.4 + Math.random() * 0.8) + 'px';
                el.style.background = colors[Math.floor(Math.random() * colors.length)];
                el.style.left = Math.random() * 100 + '%';
                el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                el.style.animationDuration = 2 + Math.random() * 3 + 's';
                el.style.animationDelay = Math.random() * 0.8 + 's';
                el.style.transform = 'rotate(' + (Math.random() * 360) + 'deg)';
                confettiContainer.appendChild(el);
                setTimeout(() => el.remove(), 5000);
            }
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  ОТРИСОВКА ДВЕРЕЙ
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        function renderDoors() {
            grid.innerHTML = '';
            const allDone = completed.size === stages.length;

            stages.forEach((stage, index) => {
                const isCompleted = completed.has(stage.id);
                const isLocked = !isCompleted && (index === 0 ? false : !completed.has(stages[index - 1].id));
                const isClickable = !isLocked && !isCompleted;

                const card = document.createElement('div');
                card.className = 'door-card';
                if (isLocked) card.classList.add('locked');
                if (isCompleted) card.classList.add('completed');

                card.innerHTML = `
              <div class="door-inner">
                <div class="door-panels"></div>
                <div class="door-number">${String(stage.id).padStart(2, '0')}</div>
                <div class="door-check">✓</div>
                <div class="door-label">${stage.icon} ${stage.title}</div>
                <div class="door-year">${stage.year}</div>
                <div class="door-handle"></div>
                <div class="door-lock-icon">${isLocked ? '🔒' : ''}</div>
              </div>
            `;

                if (isClickable) {
                    card.addEventListener('click', () => openModal(stage.id));
                } else if (isCompleted) {
                    card.addEventListener('click', () => {
                        showToast('Этот этап уже пройден! 📖', '✅');
                    });
                } else if (isLocked) {
                    card.addEventListener('click', () => {
                        showToast('Сначала пройдите предыдущий этап! 🔓', '🔒');
                    });
                }

                grid.appendChild(card);
            });

            // Обновить прогресс
            progressNum.textContent = completed.size;

            // Если все пройдены — конфетти + поздравление
            if (allDone && completed.size > 0) {
                // Показываем только один раз при завершении всех
                const alreadyCelebrated = sessionStorage.getItem('gorky_celebrated');
                if (!alreadyCelebrated) {
                    setTimeout(() => {
                        fireConfetti();
                        showToast('🎉 Поздравляем! Вы изучили биографию Горького!', '🎉');
                    }, 400);
                    sessionStorage.setItem('gorky_celebrated', 'true');
                }
            }
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  МОДАЛЬНОЕ ОКНО
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        function openModal(id) {
            const stage = stages.find(s => s.id === id);
            if (!stage) return;
            if (completed.has(id)) {
                showToast('Этот этап уже пройден!', '✅');
                return;
            }
            // Проверка: можно ли открыть
            const idx = stages.indexOf(stage);
            if (idx > 0 && !completed.has(stages[idx - 1].id)) {
                showToast('Сначала пройдите предыдущий этап!', '🔒');
                return;
            }

            currentStageId = id;
            isModalOpen = true;

            // Заполняем
            modalStage.textContent = 'ЭТАП ' + String(id).padStart(2, '0');
            modalTitle.textContent = stage.icon + ' ' + stage.title;
            modalYear.textContent = stage.year;

            modalFacts.innerHTML = '';
            stage.facts.forEach(fact => {
                const div = document.createElement('div');
                div.className = 'modal-fact';
                div.innerHTML = `
              <span class="icon">•</span>
              <span class="text">${fact}</span>
            `;
                modalFacts.appendChild(div);
            });

            modalCompleteBtn.disabled = false;
            modalCompleteBtn.textContent = '✅ Я запомнил!';

            // Открываем
            modal.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.classList.remove('open');
            document.body.style.overflow = '';
            isModalOpen = false;
            currentStageId = null;
        }

        function completeStage() {
            if (currentStageId === null) return;
            if (completed.has(currentStageId)) {
                closeModal();
                return;
            }

            // Отмечаем пройденным
            completed.add(currentStageId);
            modalCompleteBtn.disabled = true;
            modalCompleteBtn.textContent = '✅ Пройдено!';

            // Показываем конфетти за этап (немного)
            fireConfetti();

            // Обновляем двери
            renderDoors();

            // Тост
            const stage = stages.find(s => s.id === currentStageId);
            showToast(`Этап «${stage.title}» пройден!`, '📖');

            // Автоматически закрываем через 1.2с
            setTimeout(() => {
                closeModal();
                // Если все пройдены — дополнительный эффект
                if (completed.size === stages.length) {
                    setTimeout(() => {
                        fireConfetti();
                        showToast('🎉 Блестяще! Вы прошли всю биографию!', '🎉');
                    }, 300);
                }
            }, 1200);
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  СОБЫТИЯ МОДАЛИ
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        modalCompleteBtn.addEventListener('click', completeStage);

        modalBackBtn.addEventListener('click', () => {
            if (currentStageId !== null && !completed.has(currentStageId)) {
                // Если не пройдено, просто закрываем
                closeModal();
            } else {
                closeModal();
            }
        });

        modalCloseBtn.addEventListener('click', closeModal);

        // Клик по фону модали
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                if (currentStageId !== null && !completed.has(currentStageId)) {
                    // Не закрываем, если не пройдено — напоминаем
                    showToast('Сначала нажмите «Я запомнил!»', '👀');
                } else {
                    closeModal();
                }
            }
        });

        // Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && isModalOpen) {
                if (currentStageId !== null && !completed.has(currentStageId)) {
                    showToast('Сначала нажмите «Я запомнил!»', '👀');
                } else {
                    closeModal();
                }
            }
        });

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  СТАРТ
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        renderDoors();

        // Приветствие
        setTimeout(() => {
            showToast('👋 Нажмите на первую дверь, чтобы начать!', '🚪');
        }, 600);
    </script>

</body>
</html>
