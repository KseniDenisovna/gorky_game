<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Двери в жизнь Максима Горького</title>
    <style>
        /* Базовые стили и анимация */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><defs><pattern id="paper" width="10" height="10" patternUnits="userSpaceOnUse"><path d="M0,0 h10 v10 h-10 Z" fill="#fdf5e6" stroke="#d2b48c" stroke-width="0.5"/><path d="M0,0 h10 v10 h-10 Z" fill="none" stroke="#d2b48c" stroke-width="0.5"/></pattern></defs><rect width="100%" height="100%" fill="url(%23paper)"/></svg>') fixed;
            background-size: cover;
            color: #333;
            overflow: hidden;
        }

        /* Анимация фона (облака) */
        .cloud-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: -1;
        }
        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            filter: blur(40px);
        }

        /* Портрет */
        .portrait {
            text-align: center;
            padding: 20px 0;
            background-color: rgba(255, 255, 255, 0.9);
        }
        .portrait img {
            max-width: 250px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* Стартовая страница */
        .start-page {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            min-height: calc(100vh - 160px);
        }

        .doors-container {
            display: flex;
            gap: 25px;
        }

        .door {
            width: 200px;
            height: 320px;
            background-color: #e6e6fa; /* Лавандовый */
            border-radius: 15px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            color: #4b0082; /* Индиго */
            cursor: pointer;
            transition: transform 0.4s ease-in-out, box-shadow 0.4s ease-in-out;
        }

        .door.opened {
             transform: rotateY(90deg);
             background-color: #fafad2; /* Светло-золотой */
             color: #8b4513; /* Седельный коричневый */
             box-shadow: inset 0 0 30px rgba(255,215,0,0.3);
             pointer-events: none; /* Не кликабельно после открытия */
         }

         .door.opening {
             transform: rotateY(90deg);
         }
